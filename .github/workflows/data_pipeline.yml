name: Commodity Data Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-collector:
    runs-on: ubuntu-latest
    # --- ADD THIS BLOCK TO FIX THE ACCESS ERROR ---
    permissions:
      contents: write
      actions: write
    # -----------------------------------------------
    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install dependencies
        run: |
          pip install requests gspread

      - name: 4. Run collector script
        env:
          API_KEY_DATA: ${{ secrets.API_KEY_DATA }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python collector.py --once