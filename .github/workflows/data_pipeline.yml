name: Commodity Data Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:        # Allows you to click a button to run it manually

jobs:
  run-collector:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout repository code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install dependencies
        run: |
          pip install requests gspread

      - name: 4. Run collector script
        env:
          # This maps your GitHub Secrets to the script's environment
          API_KEY_DATA: ${{ secrets.API_KEY_DATA }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python collector.py --once